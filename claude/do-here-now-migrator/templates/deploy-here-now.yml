name: Deploy to here.now

# Generated by dhm (do-here-now-migrator).
#
# Replaces the retired DigitalOcean App Platform deploy-on-push integration.
# Every push to main builds the static export and publishes it to the owned
# here.now Site that serves https://{{DOMAIN}}.
#
# This workflow is written to fail loudly rather than deploy something wrong.
# A missing secret, an empty export, or a publisher that fell back to anonymous
# mode all stop the run before it can replace a working site.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: here-now-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HERENOW_API_KEY: ${{ secrets.HERENOW_API_KEY }}
      HERENOW_SLUG: ${{ vars.HERENOW_SLUG }}
      OUTPUT_DIR: "{{OUTPUT_DIR}}"
      SITE_DOMAIN: "{{DOMAIN}}"
    steps:
      - uses: actions/checkout@v4

      - name: Verify deploy configuration
        run: |
          set -euo pipefail
          [[ -n "${HERENOW_API_KEY:-}" ]] || {
            echo "::error::Missing repository secret HERENOW_API_KEY." >&2
            exit 1
          }
          [[ -n "${HERENOW_SLUG:-}" ]] || {
            echo "::error::Missing repository variable HERENOW_SLUG (the owned here.now Site slug)." >&2
            exit 1
          }
          grep -Eq '^[a-z0-9]+(-[a-z0-9]+)*$' <<<"$HERENOW_SLUG" || {
            echo "::error::HERENOW_SLUG '$HERENOW_SLUG' is not a valid slug." >&2
            exit 1
          }

      - name: Set up pnpm
        if: ${{ '{{PACKAGE_MANAGER}}' == 'pnpm' }}
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "{{NODE_VERSION}}"
          cache: {{NODE_CACHE}}

      - name: Install dependencies
        run: |
          set -euo pipefail
          {{INSTALL_COMMAND}}

      - name: Build
        run: |
          set -euo pipefail
          {{BUILD_COMMAND}}

      - name: Verify static export
        run: |
          set -euo pipefail
          [[ -f "$OUTPUT_DIR/index.html" ]] || {
            echo "::error::$OUTPUT_DIR/index.html is missing — the build is not producing a static site." >&2
            exit 1
          }
          files=$(find "$OUTPUT_DIR" -type f | wc -l)
          (( files >= 2 )) || {
            echo "::error::$OUTPUT_DIR holds only $files file(s); refusing to publish." >&2
            exit 1
          }
          echo "exported $files file(s)"

          # Anything in the export becomes public the moment it ships.
          if grep -rlE '(mongodb(\+srv)?://[^ "]*:[^ "]*@|postgres(ql)?://[^ "]*:[^ "]*@|-----BEGIN [A-Z ]*PRIVATE KEY-----)' \
               "$OUTPUT_DIR" >/dev/null 2>&1; then
            echo "::error::The export contains connection strings or private keys. Refusing to publish." >&2
            exit 1
          fi

      - name: Install the official here.now publisher
        run: npx --yes skills add heredotnow/skill --skill here-now

      - name: Publish to here.now
        run: |
          set -euo pipefail
          publisher=.agents/skills/here-now/scripts/publish.sh
          [[ -x $publisher ]] || publisher="$HOME/.agents/skills/here-now/scripts/publish.sh"
          [[ -x $publisher ]] || {
            echo "::error::here.now publish.sh not found after install." >&2
            exit 1
          }

          publish_log=$(mktemp)
          trap 'rm -f -- "$publish_log"' EXIT

          "$publisher" "$OUTPUT_DIR" --slug "$HERENOW_SLUG" --client github-actions 2>&1 | tee "$publish_log"

          auth_mode=$(sed -n 's/^publish_result\.auth_mode=//p' "$publish_log" | tail -n 1)
          site_url=$(sed -n 's/^publish_result\.site_url=//p' "$publish_log" | tail -n 1)

          # An anonymous Site expires in 24 hours. Treating that as success
          # would hand back a link that dies overnight.
          [[ $auth_mode == authenticated ]] || {
            echo "::error::Publish ran in '${auth_mode:-unknown}' mode. Check HERENOW_API_KEY." >&2
            exit 1
          }
          [[ $site_url == "https://${HERENOW_SLUG}.here.now/" ]] || {
            echo "::error::Published site_url '$site_url' does not match HERENOW_SLUG." >&2
            exit 1
          }
          echo "published=$site_url" >>"$GITHUB_STEP_SUMMARY"

      - name: Verify the production domain
        run: |
          set -euo pipefail

          # A verified custom domain with no Site mounted returns 200 serving
          # here.now's empty-domain placeholder. Comparing the apex against the
          # Site itself is the only check that catches that.
          apex=$(mktemp); site=$(mktemp)
          trap 'rm -f -- "$apex" "$site"' EXIT

          curl -fsS --max-time 30 --retry 5 --retry-delay 10 --retry-all-errors \
            "https://${SITE_DOMAIN}/" -o "$apex"
          curl -fsS --max-time 30 "https://${HERENOW_SLUG}.here.now/" -o "$site"

          if ! cmp -s "$apex" "$site"; then
            echo "::error::https://${SITE_DOMAIN}/ does not serve the published Site." >&2
            echo "::error::The domain may be unmounted (placeholder page) or bound to another slug." >&2
            exit 1
          fi
          echo "apex serves the published Site ($(wc -c <"$apex") bytes)"

          for path in / /404.html; do
            status=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 30 \
              "https://${SITE_DOMAIN}${path}" || echo 000)
            echo "$path -> $status"
          done
